name: Update NHL Standings JSON

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-standings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest standings
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --user-agent "benolivr.github.io-standings-updater/1.0 (+https://github.com/benolivr/benolivr.github.io)" \
            "https://api-web.nhle.com/v1/standings/now" \
            -o standings.new.json

          # Validate JSON before replacing the existing file.
          jq empty standings.new.json
          mv standings.new.json standings.json

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- standings.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add standings.json
          git commit -m "chore: update standings.json"
          git push
